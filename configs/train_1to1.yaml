# Training config for 1-input 1-output time-stepping.
# Data and model configs load separately from configs/data/ and configs/models/.
name: smoke
experiment_dir: runs
auto_resume: false
folder_override: ""
checkpoint_override: ""
config_override: ""

# wandb is off by default. Flip enabled=true (and optionally mode=offline
# on compute nodes that can't reach the cloud) to log metrics.
wandb:
  enabled: false
  mode: online
  project: flowers-on-the-sphere
  entity: null
  group: null
  tags: []

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-3
  weight_decay: 1.0e-4

lr_scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  T_max: 2
  eta_min: 1.0e-5

loss:
  _target_: torch.nn.MSELoss

trainer:
  _target_: fots.trainer.Trainer
  epochs: 2
  checkpoint_frequency: 1
  val_frequency: 1
  rollout_val_frequency: 1
  max_rollout_steps: 1
  grad_clip: 1.0
  checkpoint_path: ""

# Held-Suarez (ClimaAtmos) on the sphere, HDF5 spec (scripts/zarr_to_hdf5.py).
# 3-D grid: spatial = (level=8, lat=144, lon=288). 4 fields: T, ps (surface,
# broadcast across levels) + velocity vector [u, v]. On disk input_fields are
# (T, C, level, lat, lon).
#
# fold_levels_into_channels=true collapses the level axis into channels so a
# 2-sphere model sees (T, 25, 144, 288): field-major, levels contiguous --
# [T_lev0..7, ps, u_lev0..7, v_lev0..7] (ps is surface-only -> 1 channel).
# Stats are PER-LEVEL: T -> 8 values, velocity -> 8x2; ps/2-D stay single.
# SphericalHDF5Dataset normalizes per-level, then folds (a pure reshape).
data:
  _target_: fots.data.datamodule.NotWellDataModule
  path: /iopsstor/scratch/cscs/tmuser/PDEDatasets/SphericalPDEs/held-suarez-clima-hdf5
  dataset_name: held_suarez_clima  # experiment-naming only

  train_dataset:
    _target_: fots.data.spherical_hdf5.SphericalHDF5Dataset
    _partial_: true
    fold_levels_into_channels: true
  eval_dataset:
    _target_: fots.data.spherical_hdf5.SphericalHDF5Dataset
    _partial_: true
    fold_levels_into_channels: true
  batch_size: 2
  # Data is shuffle+LZ4 (re-chunked time=4 to match the read window); the read
  # is no longer decompression-bound, so more workers help and the GH200 cores
  # (72/rank) are otherwise idle. Needs `import hdf5plugin` (registered in
  # fots/data/well.py; installed in the train/smoke sbatch).
  data_workers: 16
  n_steps_input: 1
  n_steps_output: 1
  min_dt_stride: 1
  max_dt_stride: 1

  # ZScore normalization. Full stats (fields + all per-trajectory constant
  # scalars) inlined from held-suarez-clima-hdf5/stats.yaml; the_well needs an
  # entry for every constant scalar or it silently disables normalization.
  # T and velocity stats are PER-LEVEL (8 levels); SphericalHDF5Dataset
  # reshapes them to broadcast over the level axis at normalize time.
  use_normalization: true
  include_filters: []
  exclude_filters: []
  boundary_return_type: null
  meta_scalars: []


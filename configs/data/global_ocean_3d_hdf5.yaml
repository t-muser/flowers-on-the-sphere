# MITgcm global-ocean tutorial, full-depth cs32 cubed sphere, HDF5 spec
# (scripts/zarr_to_hdf5.py --dataset global-ocean-3D). Archival-faithful: NO
# regrid to lat/lon. spatial = (level=15, face=6, y=32, x=32); physical lon/lat
# (xc/yc) and the level depths (depth, m) live in the aux_coords/ group.
# 5 streams: theta/salt/u/v on the 15 model levels + surface eta (broadcast
# across levels, like held-suarez ps). u/v are grid-relative MITgcm components
# (no tangent-vector grouping). On disk input_fields are (T, C, level, face,
# y, x).
#
# fold_levels_into_channels=true collapses the level axis into channels so a
# 2-sphere model sees (T, 61, face, y, x): field-major, levels contiguous --
# [theta_lev0..14, salt_lev0..14, u_lev0..14, v_lev0..14, eta] (eta surface-only
# -> 1 channel). Stats are PER-LEVEL for theta/salt/u/v (15 values each); eta
# stays single. SphericalHDF5Dataset normalizes per-level, then folds (a pure
# reshape).
#
# Generate the per-level stats, once the dataset exists, with:
#   sbatch --export=ALL,DATASET=global-ocean-3D scripts/compute_hdf5_stats.sbatch
# then paste the printed `stats:` block below and set use_normalization: true.
data:
  _target_: fots.data.datamodule.NotWellDataModule
  path: /scicore/home/dokman0000/GROUP/PDEDatasets/SphericalPDEs/global-ocean-3D-hdf5
  dataset_name: global_ocean_3d
  train_dataset:
    _target_: fots.data.spherical_hdf5.SphericalHDF5Dataset
    _partial_: true
    fold_levels_into_channels: true
  eval_dataset:
    _target_: fots.data.spherical_hdf5.SphericalHDF5Dataset
    _partial_: true
    fold_levels_into_channels: true
  batch_size: 2
  # Data is shuffle+LZ4 (re-chunked time=4 to match the read window), so the
  # read is not decompression-bound and more workers help. Needs
  # `import hdf5plugin` (registered in fots/data/well.py; in the train sbatch).
  data_workers: 8
  n_steps_input: 1
  n_steps_output: 1
  min_dt_stride: 1
  max_dt_stride: 1
  # ZScore normalization. Stats inlined from global-ocean-3D-hdf5/stats.yaml.
  # theta/salt/u/v are PER-LEVEL (15 values each); SphericalHDF5Dataset reshapes
  # them to broadcast over the level axis, normalizes per-level, then folds.
  # eta (surface) stays single-valued. All 5 per-run sweep params are kept: they
  # vary across the train split (nonzero std) and the_well silently disables
  # normalization if any constant scalar lacks an entry.
  use_normalization: true
  include_filters: []
  exclude_filters: []
  boundary_return_type: null
  meta_scalars: []


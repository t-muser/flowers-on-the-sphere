# Coupled AIM atmosphere + ocean, native cs32 cubed sphere, HDF5 spec
# (scripts/zarr_to_hdf5.py --dataset cpl-aim-ocn). Archival-faithful: NO regrid
# to lat/lon. spatial = (level=5, face=6, j=32, i=32); physical lon/lat live in
# the aux_coords/ group (XC/YC). 19 scalar streams (channels.py order): 9 atm
# surface + 4 atm 3-D (each spanning the 5 σ-levels) + 6 ocean surface = 35
# 2-D-equivalent channels once levels are unrolled. UVEL/VVEL are stored as
# grid-relative MITgcm scalars (no tangent-vector grouping). input_fields are
# (T, C, level, face, j, i) -- a 2-sphere/lat-lon model needs a cube adapter.
#
# Stats are PER-LEVEL for the 4 atm 3-D streams (one mean/std per σ-level);
# surface streams stay single-valued. Generate them, once the dataset exists,
# with:
#   uv run scripts/compute_hdf5_stats.py --root <...>/cpl-aim-ocn-hdf5 --workers 8
# then paste the printed `stats:` block below and set use_normalization: true.
# (The on-disk regridding loader is fots/data/cpl_aim_ocn.py; this config is the
# native-cube HDF5 path for archival/publishing.)
data:
  _target_: fots.data.datamodule.NotWellDataModule
  path: /scicore/home/dokman0000/GROUP/PDEDatasets/SphericalPDEs/cpl-aim-ocn-hdf5
  well_dataset_name: cpl_aim_ocn
  train_dataset:
    _target_: fots.data.spherical_hdf5.SphericalHDF5Dataset
    _partial_: true
  eval_dataset:
    _target_: fots.data.spherical_hdf5.SphericalHDF5Dataset
    _partial_: true
  batch_size: 2
  data_workers: 8
  n_steps_input: 1
  n_steps_output: 1
  min_dt_stride: 1
  max_dt_stride: 1
  use_normalization: false  # flip to true after pasting per-level stats below
  include_filters: []
  exclude_filters: []
  boundary_return_type: null
  meta_scalars: []
  # stats:  # paste output of scripts/compute_hdf5_stats.py here

# Pre-regridded variant of global_ocean_3d.yaml. The cs32 → (64, 128) IDW
# regrid + uv rotation + land imputation are applied once (offline) by
# scripts/preprocess_global_ocean_3d_to_latlon.py and then read back from
# disk in the hot path. Channel layout / level subsetting / stats /
# masks are all preserved, so this is interchangeable with the on-the-fly
# variant from the model's POV.
data:
  _target_: fots.data.global_ocean_3d_latlon.GlobalOcean3DLatLonDataModule
  root: /iopsstor/scratch/cscs/tmuser/PDEDatasets/SphericalPDEs/global-ocean-3D-latlon
  dataset_name: global_ocean_3d_latlon
  time_steps_per_run: 1189
  # Same headline 6-level subset as global_ocean_3d.yaml.
  levels: [1, 3, 5, 7, 10, 13]
  dim_in: 28
  dim_out: 25
  spatial_resolution: [64, 128]
  grid: equiangular
  batch_size: 2
  n_steps_input: 4
  n_steps_output: 1
  num_workers: 8
  regrid_method: idw
  regrid_k: 4

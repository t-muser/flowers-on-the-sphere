# Mickelin GNS vorticity on the sphere, HDF5 spec (scripts/zarr_to_hdf5.py).
# 128x256 equiangular grid, vorticity = 1 channel.
data:
  _target_: fots.data.datamodule.NotWellDataModule
  path: /scicore/home/dokman0000/GROUP/PDEDatasets/SphericalPDEs/mickelin-gns-hdf5
  well_dataset_name: mickelin_gns  # experiment-naming only

  # Our spherical HDF5 spec (no BC group; explicit vector components).
  train_dataset:
    _target_: fots.data.spherical_hdf5.SphericalHDF5Dataset
    _partial_: true
  eval_dataset:
    _target_: fots.data.spherical_hdf5.SphericalHDF5Dataset
    _partial_: true

  batch_size: 2
  data_workers: 8
  n_steps_input: 1
  n_steps_output: 1
  min_dt_stride: 1
  max_dt_stride: 1

  # No stats.yaml shipped with the dataset yet -> normalization off. Inline a
  # `stats:` block (see planetswe.yaml) once Welford stats are computed.
  use_normalization: false
  include_filters: []
  exclude_filters: []
  boundary_return_type: null  # closed sphere: no BCs (the dataset enforces this too)
  meta_scalars: []

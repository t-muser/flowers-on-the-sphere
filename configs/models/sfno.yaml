# SFNO from torch_harmonics.examples.models.SphericalFourierNeuralOperator
# (Bonev et al., "Spherical Fourier Neural Operators", ICML 2023).
# Modes pinned via hard_thresholding_fraction so param count is grid-independent.
model:
  _target_: fots.models.baselines.sphere_models.Sfno
  embed_dim: 192
  num_layers: 4
  scale_factor: 2
  mlp_ratio: 2.0
  hard_thresholding_fraction: 0.5
  use_mlp: true
  normalization_layer: instance_norm
  residual_prediction: false
  pos_embed: none
  activation_function: gelu

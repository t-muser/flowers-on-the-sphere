# Local-S2 Transformer from torch_harmonics.examples.models.SphericalTransformer
# with attention_mode="neighborhood" (NeighborhoodAttentionS2).
# Bonev et al., "Attention on the Sphere".
#
# Width/depth matches configs/models/local_r_transformer.yaml so the two are
# parameter-matched (~19M trainable). The bulk is q/k/v/o + MLP per block;
# the DISCO encoder/decoder adds <100K params.
model:
  _target_: fots.models.baselines.sphere_models.LocalS2Transformer
  embed_dim: 384
  num_layers: 16
  num_heads: 8
  scale_factor: 2
  mlp_ratio: 2.0
  use_mlp: true
  encoder_kernel_shape: [5, 4]
  filter_basis_type: piecewise linear
  normalization_layer: instance_norm
  pos_embed: spectral
  upsample_sht: false
  residual_prediction: false
  bias: false
  activation_function: gelu
  attention_mode: neighborhood

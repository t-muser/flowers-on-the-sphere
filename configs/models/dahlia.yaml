# Dahlia — fixed sec(lat)-scaled 3×3 spherical sampling + SphericalSelfWarp
# with polar fold.
model:
  _target_: flowers.zinnia.Dahlia
  lifting_dim: 384
  n_levels: 4
  channel_multipliers: [1, 2, 4, 8]
  num_heads: 128
  groups: 32
  dropout_rate: 0.0
  coord_dim: 3
  tangent: false
  polar_fold: true

# Local-R Transformer: lat/lon-grid transformer with NATTEN's
# NeighborhoodAttention2D (rectangular local attention).
# Bonev et al., "Attention on the Sphere" (planar baseline).
#
# num_heads=12 (head_dim=32) is required by NATTEN's flex-attention backend,
# which only accepts power-of-two head_dim. Param count is unchanged vs. 8
# heads since q/k/v/o projections are embed_dim*embed_dim regardless.
model:
  _target_: fots.models.baselines.sphere_models.LocalRTransformer
  embed_dim: 384
  num_layers: 16
  num_heads: 12
  scale_factor: 2
  mlp_ratio: 2.0
  use_mlp: true
  encoder_kernel_shape: [3, 3]
  attn_kernel_shape: [7, 7]
  normalization_layer: instance_norm
  pos_embed: spectral
  upsampling_method: conv
  residual_prediction: false
  bias: false
  activation_function: gelu
  attention_mode: neighborhood
